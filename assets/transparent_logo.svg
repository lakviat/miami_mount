    </linearGradient>
    <linearGradient id="textGrad" x1="360" y1="92" x2="1020" y2="320" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1a3356"/>
      <stop offset="1" stop-color="#102845"/>
    </linearGradient>
    <filter id="softShadow" x="0" y="0" width="1280" height="420" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="6" stdDeviation="7" flood-color="#0a1730" flood-opacity="0.16"/>
    </filter>
