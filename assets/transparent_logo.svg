<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 420" role="img" aria-labelledby="title desc">
  <title id="title">TV Mount 360 logo</title>
  <desc id="desc">TV monitor icon with 360 degree arrow and TV Mount 360 wordmark</desc>

  <defs>
    <linearGradient id="ringGrad" x1="70" y1="230" x2="360" y2="230" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#2a46bf"/>
